name: Test and build

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'

# Cancel superseded runs on the same ref so a rapid push/PR series doesn't queue
# up several full builds; the latest commit is the only one worth finishing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't let one OS failing kill the others' feedback.
      fail-fast: false
      matrix:
        python-version:
          - '3.14'
        # PRs build on ubuntu only (fastest, still validates that the
        # PyInstaller package assembles). The full three-OS matrix runs on
        # pushes to master, tags, and manual dispatch, where the per-OS
        # release artifacts actually matter.
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "windows-latest", "macOS-latest"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - name: Cache cargo build
        # Caches ~/.cargo and the crate's target/ dir so the rust_parser
        # compile (via maturin during uv sync) and `cargo test` don't start
        # cold on every run.
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "stellarisdashboard/parsing/rust_parser"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies and build rust-parser
        # uv sync resolves all dependencies and builds the rust_parser
        # workspace member (via maturin), which requires the rust toolchain above.
        run: uv sync
      - name: Run cargo test
        run: cargo test
        working-directory: "stellarisdashboard/parsing/rust_parser"
      - name: Tests
        run: uv run python -m pytest -m "not skip_github_actions" --verbose
      - name: pyInstaller build
        run: uv run pyinstaller pyinstaller-package.spec
      - name: pyInstaller run
        run: |
          dist/stellarisdashboard-build/parse_saves
      # Zip the file, makes a zip containing a zip but fixes download problems due to too many small files
      - name: package files (win)
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          [IO.Compression.ZipFile]::CreateFromDirectory( (Join-Path -Path (Get-Location) -ChildPath "stellarisdashboard-build"), (Join-Path -Path (Get-Location) -ChildPath "../stellarisdashboard-${{ matrix.os }}.zip"), 'Optimal', $false )
          cd ..
      - name: package files
        if: matrix.os != 'windows-latest'
        run: |
          base_dir=`pwd`
          pushd dist/stellarisdashboard-build/
          zip -r $base_dir/stellarisdashboard-${{ matrix.os }}.zip *
          popd
      - name: Publish
        uses: actions/upload-artifact@v4
        with:
          name: stellarisdashboard-${{ matrix.os }}.zip
          path: stellarisdashboard-${{ matrix.os }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release files
        run: |
          mkdir release_files
          find artifacts -name "*.zip" -exec cp {} release_files/ \;
          ls -la release_files/
      - name: Create Release Draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gh needs to know the target repo; the release job has no checkout,
          # so without this gh fails with "fatal: not a git repository".
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create ${{ github.ref_name }} release_files/* --draft --generate-notes

